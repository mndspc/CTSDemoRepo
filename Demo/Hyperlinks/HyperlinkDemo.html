<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperlink Demo</title>
</head>
<body>
    <!--how to redirect user to external URL-->
    <a href="https://learn.microsoft.com">MSDN</a>
    <br>
    <!--how to redirect user to external URL within new tab-->
     <a href="https://learn.microsoft.com" target="_blank">MSDN</a>
    <br>
     <!--how to show user a email hyperlink?-->
     <a href="mailto:support@microsoft.com">Send Email to Support</a>
    <br>
     <!--how to show phone number link?-->
     <a href="tel:+8445432233">Contact US</a>
    <br>
     <!--How to open page with relative link?-->
     <a href="../ImageDemo.html" target="_blank">Open Image Demo Page</a>
    
     <br>
     <!--to navigate user to bottom of the page using anchor-->
    <a href="#paragraph1">Goto bottom</a>

    <br>
    <!--how to create download link-->
    <a href="../files/Demo.zip" download>Download Source Code</a>
