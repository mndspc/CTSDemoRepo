<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Row Span Demo</title>
</head>
<body>
    <table cellspacing="4" border="2" cellpadding="2">
        <thead>
            <tr>
               <th>Photo</th><th>Student Name</th><th>Date</th><th>Attendance</th><th>Reason (if Absent)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="3">
                    <img src="../images/monitor.jpg">
                </td>
                <td rowspan="3">Sameer</td>
                <td>22-Feb-2025</td>
                <td>Present</td>
                <td></td>
            </tr>
            <tr>
                <td>23-Feb-2025</td>
                <td>Present</td>
                <td></td>
            </tr>
            <tr>
                <td>24-Feb-2025</td>
                <td>Absent</td>
                <td>Seek</td>
            </tr>
            <tr>
                <td rowspan="3">Sachin</td>
                <td>22-Feb-2025</td>
                <td>Present</td>
                <td></td>
            </tr>
            <tr>
                <td>23-Feb-2025</td>
                <td>Present</td>
                <td></td>
            </tr>
            <tr>
                <td>24-Feb-2025</td>
                <td>Present</td>
                <td></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
