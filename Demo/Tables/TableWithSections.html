<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table with Section</title>
</head>
<body>
      <table>
        <caption>Employee Details</caption>
        <thead style="background-color: brown;">
            <tr>
                <th>CODE</th><th>NAME</th><th>EMAIL</th>
            </tr>
        </thead>
       
        <tbody style="background-color: cadetblue;">
            <tr>
                <td>100</td>
                <td>Scott</td>
                <td>scott@gmail.com</td>
            </tr>
            <tr>
                <td>101</td>
                <td>Smith</td>
                <td>smith@gmail.com</td>
            </tr>
            <tr>
                <td>102</td>
                <td>Tiger</td>
                <td>tiger@gmail.com</td>
            </tr>
            <tr>
                <td>103</td>
                <td>Adam</td>
                <td>adam@gmail.com</td>
            </tr>
        </tbody>

        <tfoot style="background-color: black;color: white;">
            <tr>
                <td>Copyright:</td>
                <td>2026</td>
                <td>Reserved at Upgrad</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
